# ~/.config/tmux/tmux.conf - managed via alireza-dev-env (GNU Stow)

# --- General ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"     # true color
set -ga terminal-overrides ",xterm-ghostty:Tc"
set -g mouse on
set -g history-limit 100000
set -g base-index 1                            # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on
set -sg escape-time 10                         # faster key response for nvim
set -g focus-events on
set -g set-clipboard on
setw -g mode-keys vi

# --- Prefix: Ctrl-a (easier than Ctrl-b) ---
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- Reload config ---
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# --- Splits: keep current path, intuitive keys ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind c new-window -c "#{pane_current_path}"

# --- Vi-style copy mode ---
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send -X rectangle-toggle

# --- Resize panes (repeatable) ---
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Claude AI popup (prefix + a) ---
bind a display-popup -E -w 85% -h 85% -T " Claude " "claude"
# Quick scratch popup shell (prefix + g for lazygit)
bind g display-popup -E -w 90% -h 90% -T " lazygit " "lazygit"

# --- sesh: smart session switcher (prefix + T) ---
# Fuzzy-pick any tmux session / zoxide dir / configured repo and jump to it.
bind T display-popup -E -w 60% -h 60% -T " sesh " "sesh connect \"$(sesh list --icons | fzf --ansi --no-sort --reverse --border-label ' sesh ' --prompt '⚡  ')\""

# =====================  Plugins (TPM)  =====================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'   # Ctrl-h/j/k/l nvim<->tmux
set -g @plugin 'tmux-plugins/tmux-resurrect'      # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'      # auto save/restore
set -g @plugin 'tmux-plugins/tmux-yank'           # better clipboard

# Session persistence settings
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# =====================  Theme (tokyonight storm, inline)  =====================
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1f2335,fg=#c0caf5"
set -g status-left-length 100
set -g status-right-length 100
set -g status-left "#[bg=#7aa2f7,fg=#1f2335,bold] #S #[bg=#1f2335,fg=#7aa2f7]"
set -g status-right "#[fg=#3b4261]#[bg=#3b4261,fg=#c0caf5] %Y-%m-%d #[fg=#7aa2f7]#[bg=#7aa2f7,fg=#1f2335,bold] %H:%M "
setw -g window-status-format "#[fg=#545c7e] #I:#W "
setw -g window-status-current-format "#[bg=#3b4261,fg=#7dcfff,bold] #I:#W "
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g message-style "bg=#7aa2f7,fg=#1f2335"
set -g mode-style "bg=#7aa2f7,fg=#1f2335"

# --- Bootstrap TPM if missing, then initialize (keep at very bottom) ---
if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm && ~/.config/tmux/plugins/tpm/bin/install_plugins'"
run '~/.config/tmux/plugins/tpm/tpm'
